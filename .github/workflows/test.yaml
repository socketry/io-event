name: Test

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    name: ${{matrix.ruby}} on ${{matrix.os}}
    runs-on: ${{matrix.os}}-latest
    continue-on-error: ${{matrix.experimental}}
    
    strategy:
      matrix:
        os:
          - ubuntu
          - macos
          - windows
        
        ruby:
          - "3.3"
          - "3.4"
          - "4.0"
        
        experimental: [false]
        
        include:
          - os: ubuntu
            ruby: truffleruby
            experimental: true
          - os: ubuntu
            ruby: jruby
            experimental: true
          - os: ubuntu
            ruby: head
            experimental: true
    
    steps:
    - uses: actions/checkout@v4
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{matrix.ruby}}
        bundler-cache: true
    
    - name: Install packages (Ubuntu)
      if: matrix.os == 'ubuntu'
      run: sudo apt-get install -y liburing-dev
    
    - name: Dump undefined symbols in iocp.o (Windows debug)
      if: matrix.os == 'windows'
      continue-on-error: true
      run: |
        cd ext && ruby extconf.rb && make iocp.o && nm iocp.o | grep " U "
    
    - name: Run tests
      timeout-minutes: 10
      run: bundle exec bake test
